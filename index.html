<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="宮廟管理師 60 秒形象影片試播頁" />
    <meta property="og:title" content="宮廟管理師 60 秒形象影片" />
    <meta property="og:description" content="神明的事，交給專業的人來守護。" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="assets/poster.jpg" />
    <title>宮廟管理師 60 秒形象影片</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero" aria-label="宮廟管理師影片試播">
        <div class="copy">
          <p class="eyebrow">臺灣道法總會教育委員會</p>
          <h1>宮廟管理師 60 秒形象影片</h1>
          <p class="lead">神明的事，交給專業的人來守護。</p>
        </div>

        <div class="player-wrap">
          <video
            class="player"
            controls
            playsinline
            preload="metadata"
            poster="assets/poster.jpg"
          >
            <source src="assets/temple-manager-hyperframe.mp4" type="video/mp4" />
            您的瀏覽器不支援影片播放。
          </video>
        </div>

        <div class="actions" aria-label="影片操作">
          <a class="button primary" href="assets/temple-manager-hyperframe.mp4" download>
            下載 MP4
          </a>
          <button class="button" type="button" id="shareButton">分享連結</button>
        </div>

        <section class="voice-samples" aria-label="旁白試聽">
          <div>
            <p class="eyebrow">旁白試聽</p>
            <h2>請選一組男聲</h2>
            <p class="sample-line">試聽句：神明的事，交給專業的人來守護。</p>
          </div>
          <div class="sample-grid">
            <article class="sample">
              <h3>A｜台灣口音，沉穩清新</h3>
              <audio controls preload="metadata" src="assets/audio-samples/sample-a-tw-calm.mp3"></audio>
            </article>
            <article class="sample">
              <h3>B｜典禮感，低沉穩重</h3>
              <audio controls preload="metadata" src="assets/audio-samples/sample-b-ceremony-deep.mp3"></audio>
            </article>
            <article class="sample">
              <h3>C｜順暢明亮，正式播報</h3>
              <audio controls preload="metadata" src="assets/audio-samples/sample-c-clean-smooth.mp3"></audio>
            </article>
          </div>
        </section>
      </section>

      <section class="hero episode" aria-label="宮廟管理師第二集試播">
        <div class="copy">
          <p class="eyebrow">第二集</p>
          <h1>守護土地，傳承溫度</h1>
          <p class="lead">有一種情懷，叫作不想離開。</p>
        </div>

        <div class="player-wrap">
          <video
            class="player"
            controls
            playsinline
            preload="metadata"
            poster="assets/episode2-poster.jpg"
          >
            <source src="assets/temple-manager-episode2-hyperframe.mp4" type="video/mp4" />
            您的瀏覽器不支援影片播放。
          </video>
        </div>

        <section class="voice-samples" aria-label="第二集女生旁白試聽">
          <div>
            <p class="eyebrow">女生旁白試聽</p>
            <h2>請先選一組女聲</h2>
            <p class="sample-line">試聽句：有一種情懷，叫作不想離開。</p>
          </div>
          <div class="sample-grid">
            <article class="sample">
              <h3>A｜台灣女聲，溫暖沉穩</h3>
              <audio controls preload="metadata" src="assets/audio-samples-ep2/ep2-sample-a-tw-warm.mp3"></audio>
            </article>
            <article class="sample">
              <h3>B｜台灣女聲，清新親切</h3>
              <audio controls preload="metadata" src="assets/audio-samples-ep2/ep2-sample-b-tw-clear.mp3"></audio>
            </article>
            <article class="sample">
              <h3>C｜柔順清亮，敘事感</h3>
              <audio controls preload="metadata" src="assets/audio-samples-ep2/ep2-sample-c-soft-clean.mp3"></audio>
            </article>
          </div>
        </section>
      </section>
    </main>

    <script>
      const button = document.querySelector("#shareButton");
      button.addEventListener("click", async () => {
        const shareData = {
          title: "宮廟管理師 60 秒形象影片",
          text: "神明的事，交給專業的人來守護。",
          url: window.location.href,
        };
        if (navigator.share) {
          await navigator.share(shareData);
          return;
        }
        await navigator.clipboard.writeText(window.location.href);
        button.textContent = "已複製連結";
        setTimeout(() => {
          button.textContent = "分享連結";
        }, 1800);
      });
    </script>
  </body>
</html>
